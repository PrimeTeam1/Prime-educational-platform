<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Player</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===============================
       BLACKBOOK PREMIUM THEME
       Edit colors here
    ================================ */
    :root {
      --bb-black: #0b0b0d;
      --bb-dark: #111114;
      --bb-deep: #151518;
      --bb-gold: #c9a227;
      --bb-gold-soft: #b8921f;
      --bb-gold-muted: #d4af37;
      --bb-white: #f1f1f1;
      --bb-gray: #bdbdbd;
    }

    /* ===============================
       EYE COMFORT SETTINGS
    ================================ */
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Jost', sans-serif;
      overflow-x: hidden; /* ✅ Prevent horizontal scroll */
      background: linear-gradient(180deg, var(--bb-black) 0%, var(--bb-dark) 100%);
      color: var(--bb-white);
      line-height: 1.66;
    }

    body {
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "x² + y² = r²   a² + b² = c²   f(x)=ax²+bx+c   sin²θ + cos²θ = 1   π";
      position: fixed;
      right: 3%;
      top: 14%;
      width: min(34vw, 480px);
      font-family: 'Montserrat', 'Jost', sans-serif;
      font-size: clamp(0.94rem, 1.65vw, 1.2rem);
      line-height: 2;
      letter-spacing: 2px;
      color: rgba(201, 162, 39, 0.08);
      pointer-events: none;
      z-index: 0;
      text-align: right;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 92% 6%, rgba(201, 162, 39, 0.12) 0 1px, transparent 1px 100%),
        linear-gradient(135deg, transparent 0 93.4%, rgba(201, 162, 39, 0.12) 93.4% 93.52%, transparent 93.52% 100%),
        linear-gradient(315deg, transparent 0 94.2%, rgba(201, 162, 39, 0.11) 94.2% 94.32%, transparent 94.32% 100%);
      background-size: 34px 34px, 100% 100%, 100% 100%;
      opacity: 0.12;
      mix-blend-mode: screen;
    }

    /* ===============================
       PREMIUM NAVBAR
    ================================ */
    .navbar,
    .top-contact-bar {
      max-width: 1340px;
      margin: 8px auto 6px;
      padding: 9px 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid rgba(212, 175, 55, 0.24);
      border-radius: 12px;
      background: rgba(10, 10, 16, 0.84);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.32);
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      overflow: hidden;
    }

    .top-contact-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 55, 0.06) 50%, transparent 100%);
      pointer-events: none;
    }

    .contact-links,
    .social-links {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }

    .navbar a,
    .contact-item,
    .social-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #e8e8e8;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.94rem;
      letter-spacing: 0.2px;
      transition: color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
      opacity: 0.92;
    }

    .contact-item i {
      color: rgba(212, 175, 55, 0.95);
      font-size: 0.88rem;
    }

    .navbar a:hover,
    .navbar a.active,
    .contact-item:hover,
    .social-item:hover {
      color: #d4af37;
      opacity: 1;
      transform: translateY(-1px);
    }

    .contact-divider {
      width: 1px;
      height: 18px;
      background: rgba(212, 175, 55, 0.28);
      margin: 0 2px;
    }

    .social-item {
      width: 30px;
      height: 30px;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid rgba(212, 175, 55, 0.22);
      color: #e7e7e7;
      background: rgba(255, 255, 255, 0.03);
      font-size: 0.82rem;
    }

    .social-item:hover {
      background: rgba(212, 175, 55, 0.1);
      border-color: rgba(212, 175, 55, 0.45);
      color: #f5c95a;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 26px;
      max-width: 100%;
      position: relative;
      z-index: 1;
      gap: 8px 0;
    }

    .tabs {
      flex: 1 1 300px;
      padding: 22px;
      max-width: 600px;
    }

    .tabs .tab-buttons {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }

    .tabs .tab-buttons button {
      padding: 10px 20px;
      border: 1px solid rgba(245, 196, 0, 0.68);
      background: var(--bb-black);
      color: var(--bb-gold);
      cursor: pointer;
      border-radius: 999px;
      font-weight: bold;
      letter-spacing: 1px;
      transition: all 0.22s ease;
      box-shadow: none;
    }

    .tabs .tab-buttons button:hover {
      background: var(--bb-gold);
      color: #060606;
      box-shadow: 0 0 10px rgba(201, 162, 39, 0.15);
    }

    .tabs .tab-buttons button.active {
      background: var(--bb-gold);
      color: #060606;
      border-color: var(--bb-gold);
      box-shadow: 0 0 10px rgba(201, 162, 39, 0.15);
    }

    .tab-content {
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
      padding: 12px;
      overflow-x: hidden;
      border: 1px solid rgba(212,175,55,0.35);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(6px);
    }

    .tab-content h3 {
      margin: 6px 0 14px;
      color: var(--bb-white);
      font-family: 'Montserrat', 'Jost', sans-serif;
      letter-spacing: 1.5px;
    }

    .tab-content ul {
      list-style: none;
      padding: 0;
    }

    .tab-content li {
      margin: 10px 0;
    }

    .resource-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      color: var(--bb-white);
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .resource-btn:hover {
      border-color: rgba(212, 175, 55, 0.42);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }

    .resource-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .resource-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .resource-btn i {
      color: var(--bb-gold);
      min-width: 24px;
    }

    /* ===============================
       PREMIUM MODULE COLORS
    ================================ */
    .module-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid transparent;
      margin-left: auto;
    }

    .module-badge.overview {
      background: rgba(150, 32, 32, 0.18);
      color: #ffb3b3;
      border-color: rgba(190, 55, 55, 0.45);
    }

    .module-badge.assignment {
      background: rgba(28, 120, 75, 0.18);
      color: #a8f0c6;
      border-color: rgba(70, 180, 120, 0.45);
    }

    .module-badge.video {
      background: rgba(212, 175, 55, 0.16);
      color: #e6c96a;
      border-color: rgba(212, 175, 55, 0.4);
    }

    .module-badge.quiz {
      background: rgba(120, 80, 180, 0.18);
      color: #d8c4ff;
      border-color: rgba(150, 110, 220, 0.45);
    }

    .module-badge.pdf {
      background: rgba(55, 105, 180, 0.18);
      color: #bcd8ff;
      border-color: rgba(80, 135, 220, 0.45);
    }

    .mini-reader {
      margin-top: 12px;
      display: none;
    }

    .mini-reader.active {
      display: block;
    }

    /* ===============================
       PREVIEW MODAL SIZE SETTINGS
       =============================== */
    .preview-modal {
      width: 100%;
      height: min(92vh, calc(100vh - 120px));
      max-width: 1600px;
      margin: auto;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      background: #0a0a0a;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(245, 196, 0, 0.52);
    }

    .mini-reader-header {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 16px;
      background: #111111;
      border-bottom: 1px solid rgba(245, 196, 0, 0.38);
      font-weight: 600;
      color: var(--bb-white);
      flex-shrink: 0;
    }

    .mini-reader-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mini-reader-open {
      border: 1px solid rgba(245, 196, 0, 0.6);
      background: #070707;
      color: var(--bb-gold);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .mini-reader-open:hover {
      background: var(--bb-gold);
      color: #050505;
    }

    .mini-reader-back {
      border: 1px solid rgba(245, 196, 0, 0.65);
      background: #060606;
      color: var(--bb-gold);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .mini-reader-back:hover {
      background: var(--bb-gold);
      color: #050505;
    }

    .mini-reader-close {
      border: 1px solid rgba(245, 196, 0, 0.6);
      background: #070707;
      color: var(--bb-gold);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: all 0.2s ease;
    }

    .mini-reader-close:hover {
      background: var(--bb-gold);
      color: #050505;
    }

    .mini-reader-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      background: #000;
    }

    .video-section {
      flex: 1 1 400px;
      padding: 22px;
    }

    .video-title {
      font-family: 'Montserrat', 'Jost', sans-serif;
      font-size: 1.28em;
      margin-bottom: 10px;
      color: var(--bb-white);
      letter-spacing: 1.4px;
    }

    iframe {
      width: 100%;
      /* Make embedded Drive/YouTube player controls match full-screen feel */
      height: clamp(480px, 75vh, 950px);
      border-radius: 10px;
      border: 1px solid rgba(245, 196, 0, 0.42);
      display: block;
      box-shadow: 0 0 0 rgba(245, 196, 0, 0), 0 18px 34px rgba(0, 0, 0, 0.5);
    }

    .back-wrap {
      padding: 15px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 600;
      color: var(--bb-gold);
      background: #070707;
      border: 1px solid rgba(245, 196, 0, 0.7);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .back-btn:hover {
      color: #070707;
      background: var(--bb-gold);
      opacity: 1;
      transform: translateY(-1px);
      box-shadow: 0 0 10px rgba(201, 162, 39, 0.15);
    }

    .manage-links-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 600;
      color: var(--bb-gold);
      background: #0a0a0a;
      border: 1px solid rgba(245, 196, 0, 0.6);
      padding: 9px 14px;
      border-radius: 999px;
      transition: all 0.2s ease;
    }

    .manage-links-btn:hover {
      background: var(--bb-gold);
      border-color: var(--bb-gold);
      color: #060606;
      box-shadow: 0 0 10px rgba(201, 162, 39, 0.15);
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      body::before {
        width: 86vw;
        right: 4%;
        top: 9%;
        font-size: 0.86rem;
        line-height: 1.9;
      }

      .top-contact-bar {
        margin: 8px 10px 4px;
        padding: 10px 12px;
        gap: 10px;
        border-radius: 10px;
      }

      .contact-links {
        gap: 10px;
      }

      .contact-item {
        font-size: 0.86rem;
      }

      .contact-divider {
        display: none;
      }

      .social-links {
        width: 100%;
        justify-content: flex-end;
        gap: 8px;
      }

      .resource-btn {
        font-size: 0.98rem;
        padding: 12px 14px;
      }

      .module-badge {
        font-size: 0.68rem;
        padding: 3px 8px;
      }

      .container {
        flex-direction: column;
        padding: 10px;
      }

      .tabs, .video-section {
        padding: 10px;
      }

      iframe {
        height: clamp(260px, 45vh, 560px);
      }

      .tabs .tab-buttons {
        flex-wrap: wrap;
        gap: 10px;
      }

      .preview-modal {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        border: 1px solid rgba(245, 196, 0, 0.32);
      }
    }
  </style>
</head>

    // Build per-lesson viewer config (cards + links).
    var lessonResourceConfigs = {};
    allLessonKeys.forEach(function(lessonKey) {
      var lessonConfig = buildEmptyLessonConfig(lessonKey);
      lessonConfig.resourceLinks = lessonResourceLinks[lessonKey] || createEmptyLinksConfig();
      lessonResourceConfigs[lessonKey] = lessonConfig;
    });

//////////////////////////////////////////////////////////////////////////////////////////////////////
    var currentLessonKey = '';

    function getCurrentLessonConfig() {
      return lessonResourceConfigs[currentLessonKey] || buildEmptyLessonConfig(currentLessonKey || 'default-lesson');
    }

    function getResourceUrl(resource) {
      if (!resource || !resource.type || !resource.linkKey) return '';
      var lessonConfig = getCurrentLessonConfig();
      var categoryLinks = lessonConfig.resourceLinks[resource.type] || {};
      return categoryLinks[resource.linkKey] || '';
    }


    (function setBackTarget() {
      var backLink = document.getElementById('backToCourseContent');
      if (!backLink) return;

      // If user came from a course content page, return there.
      var ref = document.referrer || '';
      if (/course-content-[^/]+\.html/i.test(ref)) {
        backLink.href = ref;
      }
    })();

    function showTab(event, tabId) {
      document.querySelectorAll('.tab-content').forEach(function(el) {
        el.style.display = 'none';
      });
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.classList.remove('active');
      });

      document.getElementById(tabId).style.display = 'block';
      if (event && event.currentTarget) {
        event.currentTarget.classList.add('active');
      }
    }

    function getModuleBadgeType(resource, category) {
      var title = ((resource && resource.title) || '').toLowerCase();

      if (title.indexOf('overview') !== -1) return 'overview';
      if (title.indexOf('assignment') !== -1 || title.indexOf('homework') !== -1) return 'assignment';
      if (title.indexOf('quiz') !== -1 || title.indexOf('exam') !== -1 || category === 'quizzes') return 'quiz';
      if (title.indexOf('video') !== -1 || title.indexOf('lesson') !== -1) return 'video';
      if (category === 'pdfs' || category === 'materials' || title.indexOf('pdf') !== -1 || title.indexOf('material') !== -1) return 'pdf';

      return 'video';
    }

    function getModuleBadgeLabel(type) {
      var labels = {
        overview: 'Overview',
        assignment: 'Assignment',
        video: 'Lesson',
        quiz: 'Quiz',
        pdf: 'Material'
      };
      return labels[type] || 'Module';
    }

    function renderResourceList(category) {
      var listEl = document.getElementById(category + 'List');
      if (!listEl) return;

      listEl.innerHTML = '';
      var lessonConfig = getCurrentLessonConfig();
      (lessonConfig.resources[category] || []).forEach(function(resource) {
        var item = document.createElement('li');
        var button = document.createElement('button');
        var mainWrap = document.createElement('span');
        var icon = document.createElement('i');
        var titleText = document.createElement('span');
        var badge = document.createElement('span');
        var badgeType = getModuleBadgeType(resource, category);

        button.className = 'resource-btn';
        button.type = 'button';
        button.setAttribute('data-id', resource.id);
        button.setAttribute('data-type', resource.type);
        button.setAttribute('data-link-key', resource.linkKey);

        mainWrap.className = 'resource-main';
        icon.className = resource.icon;
        titleText.className = 'resource-title';
        titleText.textContent = resource.title;

        badge.className = 'module-badge ' + badgeType;
        badge.textContent = getModuleBadgeLabel(badgeType);

        mainWrap.appendChild(icon);
        mainWrap.appendChild(titleText);
        button.appendChild(mainWrap);
        button.appendChild(badge);
        button.addEventListener('click', function() {
          openResourceMiniWindow(resource);
        });

        item.appendChild(button);
        listEl.appendChild(item);
      });
    }

    function renderResources() {
      renderResourceList('pdfs');
      renderResourceList('materials');
      renderResourceList('quizzes');
    }

    function isValidResourceLink(url) {
      return typeof url === 'string' && /^https?:\/\//i.test(url.trim());
    }

    function normalizeEmbedUrl(rawUrl) {
      if (!rawUrl) return '';
      var url = rawUrl.trim();

      // YouTube watch/share -> embed
      if (url.indexOf('youtube.com/watch') !== -1) {
        var videoId = (url.split('v=')[1] || '').split('&')[0];
        if (videoId) return 'https://www.youtube.com/embed/' + videoId;
      }
      if (url.indexOf('youtu.be/') !== -1) {
        var shortId = (url.split('youtu.be/')[1] || '').split('?')[0];
        if (shortId) return 'https://www.youtube.com/embed/' + shortId;
      }

      // Google Drive file URL -> preview
      if (url.indexOf('drive.google.com/file/d/') !== -1) {
        var fileId = (url.split('/d/')[1] || '').split('/')[0];
        if (fileId) return 'https://drive.google.com/file/d/' + fileId + '/preview';
      }

      return url;
    }

    function openResourceMiniWindow(resource) {
      var url = getResourceUrl(resource);
      var title = resource && resource.title ? resource.title : 'Resource Viewer';
      var reader = document.getElementById('miniReader');
      var frame = document.getElementById('miniReaderFrame');
      var titleEl = document.getElementById('miniReaderTitle');
      var openNewTabEl = document.getElementById('miniReaderOpenNew');
      var messageEl = document.getElementById('miniReaderMessage');

      var hasValidLink = isValidResourceLink(url);
      var embeddedUrl = hasValidLink ? normalizeEmbedUrl(url) : '';

      titleEl.textContent = title;
      openNewTabEl.href = hasValidLink ? url : '#';
      openNewTabEl.style.pointerEvents = hasValidLink ? 'auto' : 'none';
      openNewTabEl.style.opacity = hasValidLink ? '1' : '0.6';

      if (hasValidLink && embeddedUrl) {
        frame.style.display = 'block';
        frame.src = embeddedUrl;
        messageEl.style.display = 'none';
      } else {
        frame.style.display = 'none';
        frame.src = '';
        messageEl.textContent = 'No preview link added yet.';
        messageEl.style.display = 'block';
      }

      document.getElementById('choicesPanel').style.display = 'none';
      reader.classList.add('active');
    }

    function backToChoices() {
      closeMiniReader();
    }

    function closeMiniReader() {
      var reader = document.getElementById('miniReader');
      var frame = document.getElementById('miniReaderFrame');
      var messageEl = document.getElementById('miniReaderMessage');
      frame.src = '';
      frame.style.display = 'block';
      messageEl.style.display = 'none';
      reader.classList.remove('active');
      document.getElementById('choicesPanel').style.display = 'block';
    }

    // Load main video passed from index.html:
    // video-player.html?video=<youtube_or_drive_url>&title=<optional_title>&lesson=<lesson_key>
    function loadMainVideoFromQuery() {
      var params = new URLSearchParams(window.location.search);
      var rawVideoUrl = (params.get('video') || '').trim();
      var rawTitle = (params.get('title') || '').trim();
      var lessonParam = (params.get('lesson') || '').trim();

      currentLessonKey = lessonParam;

      var titleEl = document.getElementById('mainVideoTitle');
      if (rawTitle && titleEl) titleEl.textContent = '▶️ ' + rawTitle;

      var frame = document.getElementById('mainVideoFrame');
      if (!frame) return;

      if (!rawVideoUrl) {
        // Keep the iframe empty if no URL is provided.
        return;
      }

      var embeddedUrl = normalizeEmbedUrl(rawVideoUrl);
      frame.src = embeddedUrl;
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadMainVideoFromQuery();
      renderResources();
    });
  </script>
